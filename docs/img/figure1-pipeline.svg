<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 605" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-color="#00000018"/>
    </filter>
    <!-- Arrow marker (solid) -->
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#5a6270"/>
    </marker>
    <!-- Arrow marker (dashed / eval) -->
    <marker id="arrow-eval" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#b0677a"/>
    </marker>
    <!-- Arrow marker (dashed / test → rephrase/wiki) -->
    <marker id="arrow-test" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#8a9bae" opacity="0.55"/>
    </marker>
    <!-- Reward signal arrow (distinct orange/amber) -->
    <marker id="arrow-reward" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7 z" fill="#c49030"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="940" height="605" fill="#ffffff" rx="0"/>

  <!-- ============================================================ -->
  <!-- LAYER 1: Source Data                                          -->
  <!-- ============================================================ -->
  <rect x="345" y="24" width="230" height="48" rx="8" fill="#e8edf3" stroke="#8a9bae" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="460" y="44" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a4555">178 Guidelines</text>
  <text x="460" y="61" text-anchor="middle" font-size="11.5" fill="#6b7a8d">Clinical Protocols · SUS</text>

  <!-- ============================================================ -->
  <!-- LAYER 2: Protocol-level Split (symmetric arrows)              -->
  <!-- ============================================================ -->
  <line x1="400" y1="72" x2="270" y2="112" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="520" y1="72" x2="650" y2="112" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Train box -->
  <rect x="160" y="114" width="220" height="46" rx="8" fill="#dce8f0" stroke="#7a9bb5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="270" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a5068">89 Train Guidelines</text>

  <!-- Test box -->
  <rect x="540" y="114" width="220" height="46" rx="8" fill="#dce8f0" stroke="#7a9bb5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="650" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a5068">89 Test Guidelines</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: PHASE CONTAINERS (Data Generation & Benchmark Gen)   -->
  <!-- ============================================================ -->

  <!-- Data Generation phase container (green tint) -->
  <rect x="10" y="194" width="540" height="220" rx="12" fill="#f0f9f3" stroke="#a8d4b5" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="280" y="212" text-anchor="middle" font-size="11" fill="#2d6e42" font-weight="bold" letter-spacing="0.6">TRAINING DATA GENERATION</text>
  <text x="280" y="225" text-anchor="middle" font-size="9.5" fill="#5a8a6e" font-style="italic">4 generators × 10 outputs each</text>

  <!-- Benchmark Generation phase container (pink tint) -->
  <rect x="560" y="194" width="370" height="220" rx="12" fill="#fdf5f5" stroke="#e5c0c3" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="745" y="212" text-anchor="middle" font-size="11" fill="#8b3a3f" font-weight="bold" letter-spacing="0.6">BENCHMARK GENERATION</text>

  <!-- Arrow: Train → Data Generation container -->
  <line x1="270" y1="160" x2="270" y2="194" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Arrow: Test → Benchmark Generation container -->
  <line x1="650" y1="160" x2="650" y2="194" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Dashed arrows: Test → Rephrase & Wiki (all-guideline data) -->
  <path d="M630,160 L630,182 L447,182 L447,238" stroke="#8a9bae" stroke-width="1.1" stroke-dasharray="5,3" fill="none" opacity="0.45" marker-end="url(#arrow-test)"/>
  <path d="M447,182 L285,182 L285,238" stroke="#8a9bae" stroke-width="1.1" stroke-dasharray="5,3" fill="none" opacity="0.45" marker-end="url(#arrow-test)"/>
  <!-- Label on the all-guideline dashed arrow -->
  <text x="370" y="176" text-anchor="middle" font-size="10" fill="#6b7a8d" font-style="italic" opacity="0.75">knowledge only, not QA (see Section 3)</text>

  <!-- ============================================================ -->
  <!-- LAYER 4: Augmentation Types (inside Data Generation)          -->
  <!-- ============================================================ -->

  <!-- QA Pairs — train only -->
  <rect x="25" y="238" width="155" height="52" rx="7" fill="#e6f4ea" stroke="#82c496" stroke-width="1" filter="url(#shadow)"/>
  <text x="102.5" y="258" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d6e42">QA Pairs</text>
  <text x="102.5" y="278" text-anchor="middle" font-size="11" fill="#4a8a5e">3,560 (train only)</text>

  <!-- Rephrase -->
  <rect x="193" y="238" width="155" height="52" rx="7" fill="#e6f4ea" stroke="#82c496" stroke-width="1" filter="url(#shadow)"/>
  <text x="270.5" y="258" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d6e42">Rephrase</text>
  <text x="270.5" y="278" text-anchor="middle" font-size="11" fill="#4a8a5e">7,120 (all guidelines)</text>

  <!-- Wiki Article -->
  <rect x="370" y="238" width="155" height="52" rx="7" fill="#e6f4ea" stroke="#82c496" stroke-width="1" filter="url(#shadow)"/>
  <text x="447.5" y="258" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#2d6e42">Wiki Article</text>
  <text x="447.5" y="278" text-anchor="middle" font-size="11" fill="#4a8a5e">7,120 (all guidelines)</text>

  <!-- ============================================================ -->
  <!-- LAYER 4b: Benchmarks (inside Benchmark Generation)            -->
  <!-- ============================================================ -->

  <!-- HealthBench-BR -->
  <rect x="580" y="238" width="160" height="52" rx="7" fill="#fce8e8" stroke="#d4979a" stroke-width="1" filter="url(#shadow)"/>
  <text x="660" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b3a3f">HealthBench-BR</text>
  <text x="660" y="278" text-anchor="middle" font-size="11" fill="#a95a5e">1,780 True/False</text>

  <!-- PCDT-QA -->
  <rect x="760" y="238" width="160" height="52" rx="7" fill="#fce8e8" stroke="#d4979a" stroke-width="1" filter="url(#shadow)"/>
  <text x="840" y="258" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b3a3f">PCDT-QA</text>
  <text x="840" y="278" text-anchor="middle" font-size="11" fill="#a95a5e">890 Open-Ended QA</text>

  <!-- ============================================================ -->
  <!-- LAYER 5: Synthetic Dataset (inside Data Generation)           -->
  <!-- ============================================================ -->

  <!-- Arrows from 3 types to Synthetic Dataset -->
  <line x1="102.5" y1="290" x2="210" y2="360" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="270.5" y1="290" x2="270.5" y2="360" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="447.5" y1="290" x2="330" y2="360" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Synthetic Dataset box -->
  <rect x="155" y="362" width="230" height="44" rx="8" fill="#c8e6c9" stroke="#5da96e" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="270" y="380" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d6e42">Synthetic Dataset</text>
  <text x="270" y="397" text-anchor="middle" font-size="11" fill="#4a8a5e">17,800 examples · ~70M tokens</text>

  <!-- ============================================================ -->
  <!-- LAYER 6: Training Pipeline (horizontal)                       -->
  <!-- ============================================================ -->

  <!-- Arrow from Synthetic Dataset to Training -->
  <line x1="270" y1="406" x2="270" y2="450" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Background panel for training pipeline -->
  <rect x="60" y="450" width="770" height="70" rx="10" fill="#fff8f0" stroke="#e0c9a8" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="80" y="467" font-size="10" fill="#b89a6a" font-weight="bold" letter-spacing="0.5">TRAINING PIPELINE</text>

  <!-- Base model -->
  <rect x="80" y="476" width="155" height="36" rx="6" fill="#fde8d0" stroke="#d4a96a" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="157.5" y="499" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6530">Qwen2.5-14B-Instruct</text>

  <!-- Arrow: Base → CPT -->
  <line x1="235" y1="494" x2="280" y2="494" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- CPT -->
  <rect x="280" y="476" width="175" height="36" rx="6" fill="#fde8d0" stroke="#d4a96a" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="367.5" y="499" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6530">Continual Pre-Training</text>

  <!-- Arrow: CPT → RL -->
  <line x1="455" y1="494" x2="500" y2="494" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- RL (GRPO) -->
  <rect x="500" y="476" width="155" height="36" rx="6" fill="#fde8d0" stroke="#d4a96a" stroke-width="1.1" filter="url(#shadow)"/>
  <text x="577.5" y="492" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8a6530">Reinforcement Learning</text>
  <text x="577.5" y="507" text-anchor="middle" font-size="10.5" fill="#b89a6a">(GRPO)</text>

  <!-- Arrow: RL → Final -->
  <line x1="655" y1="494" x2="688" y2="494" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Final Model -->
  <rect x="688" y="476" width="125" height="36" rx="6" fill="#f5c882" stroke="#c49030" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="750.5" y="499" text-anchor="middle" font-size="13" font-weight="bold" fill="#6e4e10">Final Model</text>

  <!-- ============================================================ -->
  <!-- REWARD SIGNAL + EVALUATION ARROWS (horizontals at y=432)      -->
  <!-- ============================================================ -->

  <!-- Reward: HealthBench-BR train → RL (GRPO) -->
  <path d="M620,290 L620,432 L577,432 L577,476"
        stroke="#c49030" stroke-width="1.4" stroke-dasharray="7,4" fill="none" opacity="0.55"
        marker-end="url(#arrow-reward)"/>
  <!-- Label on the reward arrow -->
  <text x="612" y="358" font-size="10" fill="#a07828" font-style="italic" text-anchor="end" opacity="0.7">train split</text>
  <text x="612" y="371" font-size="10" fill="#a07828" font-style="italic" text-anchor="end" opacity="0.7">(reward signal)</text>

  <!-- Final Model → HealthBench-BR -->
  <path d="M738,476 L738,432 L660,432 L660,290" stroke="#b0677a" stroke-width="1.3" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-eval)"/>

  <!-- Final Model → PCDT-QA -->
  <path d="M763,476 L763,432 L840,432 L840,290" stroke="#b0677a" stroke-width="1.3" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-eval)"/>

  <!-- ============================================================ -->
  <!-- LEGEND                                                        -->
  <!-- ============================================================ -->
  <g transform="translate(80,543)">
    <!-- Row 1: Arrow types -->
    <line x1="0" y1="8" x2="28" y2="8" stroke="#5a6270" stroke-width="1.3" marker-end="url(#arrow)"/>
    <text x="36" y="12" font-size="10.5" fill="#5a6270">Data flow</text>

    <line x1="115" y1="8" x2="143" y2="8" stroke="#8a9bae" stroke-width="1.1" stroke-dasharray="5,3" opacity="0.45" marker-end="url(#arrow-test)"/>
    <text x="151" y="12" font-size="10.5" fill="#5a6270">All-guideline data</text>

    <line x1="290" y1="8" x2="318" y2="8" stroke="#b0677a" stroke-width="1.3" stroke-dasharray="6,3" marker-end="url(#arrow-eval)"/>
    <text x="326" y="12" font-size="10.5" fill="#5a6270">Evaluation</text>

    <line x1="410" y1="8" x2="438" y2="8" stroke="#c49030" stroke-width="1.4" stroke-dasharray="7,4" marker-end="url(#arrow-reward)"/>
    <text x="446" y="12" font-size="10.5" fill="#5a6270">Reward signal</text>

    <!-- Row 2: Color swatches -->
    <rect x="0" y="26" width="12" height="12" rx="3" fill="#dce8f0" stroke="#7a9bb5" stroke-width="0.8"/>
    <text x="18" y="36" font-size="10.5" fill="#5a6270">Source data</text>

    <rect x="115" y="26" width="12" height="12" rx="3" fill="#e6f4ea" stroke="#82c496" stroke-width="0.8"/>
    <text x="133" y="36" font-size="10.5" fill="#5a6270">Synthetic data</text>

    <rect x="250" y="26" width="12" height="12" rx="3" fill="#fde8d0" stroke="#d4a96a" stroke-width="0.8"/>
    <text x="268" y="36" font-size="10.5" fill="#5a6270">Training</text>

    <rect x="340" y="26" width="12" height="12" rx="3" fill="#fce8e8" stroke="#d4979a" stroke-width="0.8"/>
    <text x="358" y="36" font-size="10.5" fill="#5a6270">Evaluation benchmarks</text>
  </g>
</svg>
