<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <!-- ======================================================== -->
  <!-- PANEL 1: HealthBench-BR (left)                           -->
  <!-- ======================================================== -->

  <!-- panel container -->
  <rect x="1" y="1" width="352" height="318" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="3"/>

  <!-- header -->
  <rect x="1" y="1" width="352" height="44" fill="#eef2ff" rx="3"/>
  <rect x="1" y="42" width="352" height="3" fill="#3730a3"/>
  <text x="14" y="22" font-size="13" font-weight="700" fill="#312e81">HealthBench-BR</text>
  <text x="340" y="22" font-size="10.5" font-weight="600" fill="#312e81" text-anchor="end">1,780 items</text>
  <text x="14" y="36" font-size="9.5" fill="#312e81">Paired true/false statements · precise factual recall</text>

  <!-- source bar -->
  <rect x="1" y="45" width="352" height="22" fill="#f9fafb"/>
  <line x1="1" y1="67" x2="353" y2="67" stroke="#e5e7eb" stroke-width="1"/>
  <text x="14" y="60" font-size="9.5" fill="#4b5563">
    <tspan font-weight="600">Source: </tspan><tspan font-style="italic">PCDT — AVC Isquêmico Agudo</tspan>
  </text>

  <!-- description -->
  <text x="14" y="84" font-size="10" fill="#374151" font-style="italic">Paired assertions differing in one critical detail:</text>

  <!-- TRUE box (height matched to Q box: h=72) -->
  <rect x="8" y="92" width="338" height="72" fill="#f0fdf4" stroke="#86efac" stroke-width="1" rx="3"/>
  <rect x="8" y="92" width="3" height="72" fill="#15803d"/>
  <text x="20" y="107" font-size="9.5" font-weight="700" fill="#15803d">✓ TRUE</text>
  <text x="20" y="123" font-size="10.5" fill="#1f2937" font-family="Georgia, Times, serif">
    <tspan x="20" dy="0">Alteplase: 0,9 mg/kg (máximo 90 mg) por via <tspan font-weight="700" fill="#15803d">intravenosa</tspan>,</tspan>
    <tspan x="20" dy="14">10% em bolus e restante em 60 minutos, até 4h30.</tspan>
  </text>

  <!-- FALSE box (aligned with A box: y=170, h=58) -->
  <rect x="8" y="170" width="338" height="58" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="3"/>
  <rect x="8" y="170" width="3" height="58" fill="#b91c1c"/>
  <text x="20" y="185" font-size="9.5" font-weight="700" fill="#b91c1c">✗ FALSE</text>
  <text x="20" y="201" font-size="10.5" fill="#1f2937" font-family="Georgia, Times, serif">
    <tspan x="20" dy="0">Alteplase: 0,9 mg/kg (máximo 90 mg) por via <tspan font-weight="700" fill="#b91c1c">intra-arterial</tspan>,</tspan>
    <tspan x="20" dy="14">10% em bolus e restante em 60 minutos, até 4h30.</tspan>
  </text>

  <!-- evaluation note (line y=236, text y=254) -->
  <line x1="14" y1="236" x2="340" y2="236" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="14" y="254" font-size="9.5" fill="#4b5563">
    <tspan x="14" font-weight="600">Evaluation:</tspan>
    <tspan x="14" dy="13"> the model is prompted to follow a specific answer</tspan>
    <tspan x="14" dy="13"> format; the verdict (<tspan font-style="italic">Verdadeiro</tspan> / <tspan font-style="italic">Falso</tspan>) is then</tspan>
    <tspan x="14" dy="13"> extracted via regex.</tspan>
  </text>

  <!-- ======================================================== -->
  <!-- PANEL 2: PCDT-QA (right)                                 -->
  <!-- ======================================================== -->

  <!-- panel container -->
  <rect x="367" y="1" width="352" height="318" fill="#ffffff" stroke="#d1d5db" stroke-width="1" rx="3"/>

  <!-- header -->
  <rect x="367" y="1" width="352" height="44" fill="#ffedd5" rx="3"/>
  <rect x="367" y="42" width="352" height="3" fill="#c2410c"/>
  <text x="380" y="22" font-size="13" font-weight="700" fill="#7c2d12">PCDT-QA</text>
  <text x="706" y="22" font-size="10.5" font-weight="600" fill="#7c2d12" text-anchor="end">890 items</text>
  <text x="380" y="36" font-size="9.5" fill="#7c2d12">Open-ended clinical questions · LLM-as-judge</text>

  <!-- source bar -->
  <rect x="367" y="45" width="352" height="22" fill="#f9fafb"/>
  <line x1="367" y1="67" x2="719" y2="67" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="60" font-size="9.5" fill="#4b5563">
    <tspan font-weight="600">Source: </tspan><tspan font-style="italic">PCDT — Leucemia Mieloide Crônica do Adulto</tspan>
  </text>

  <!-- description -->
  <text x="380" y="84" font-size="10" fill="#374151" font-style="italic">Open-ended question paired with a reference answer:</text>

  <!-- Q box -->
  <rect x="374" y="92" width="338" height="72" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="3"/>
  <rect x="374" y="92" width="3" height="72" fill="#475569"/>
  <text x="386" y="107" font-size="9.5" font-weight="700" fill="#475569">Q · QUESTION</text>
  <text x="386" y="123" font-size="10.5" fill="#1f2937" font-family="Georgia, Times, serif">
    <tspan x="386" dy="0">Qual é o medicamento de primeira linha recomendado</tspan>
    <tspan x="386" dy="14">pelo PCDT da Leucemia Mieloide Crônica do Adulto</tspan>
    <tspan x="386" dy="14">para o tratamento da LMC em fase crônica?</tspan>
  </text>

  <!-- A box -->
  <rect x="374" y="170" width="338" height="58" fill="#fff7ed" stroke="#fdba74" stroke-width="1" rx="3"/>
  <rect x="374" y="170" width="3" height="58" fill="#9a3412"/>
  <text x="386" y="185" font-size="9.5" font-weight="700" fill="#9a3412">A · REFERENCE ANSWER</text>
  <text x="386" y="201" font-size="10.5" fill="#1f2937" font-family="Georgia, Times, serif">
    <tspan x="386" dy="0">O medicamento de primeira linha recomendado é o</tspan>
    <tspan x="386" dy="14"><tspan font-weight="700">mesilato de imatinibe</tspan>, na dose de <tspan font-weight="700">400 mg/dia</tspan>.</tspan>
  </text>

  <!-- evaluation note (line y=236, text y=254) -->
  <line x1="380" y1="236" x2="706" y2="236" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="380" y="254" font-size="9.5" fill="#4b5563">
    <tspan x="380" font-weight="600">Evaluation:</tspan>
    <tspan x="380" dy="13"> an LLM judge (GPT-4.1) compares the model's</tspan>
    <tspan x="380" dy="13"> free-text answer against the reference and issues</tspan>
    <tspan x="380" dy="13"> a binary verdict (correct / incorrect).</tspan>
  </text>
</svg>
